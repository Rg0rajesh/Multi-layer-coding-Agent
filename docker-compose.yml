# docker-compose.yml
name: agentx

networks:
  agentx-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  ollama_data:
  chroma_data:

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: agentx_db
      POSTGRES_USER: agentx
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports: ["5432:5432"]
    networks: [agentx-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentx -d agentx_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes: [redis_data:/data]
    ports: ["6379:6379"]
    networks: [agentx-net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes: [ollama_data:/root/.ollama]
    ports: ["11434:11434"]
    networks: [agentx-net]
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # Pulls the model once on first boot instead of relying on a manual step.
  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    networks: [agentx-net]
    entrypoint: ["sh", "-c", "OLLAMA_HOST=ollama:11434 ollama pull qwen2.5-coder"]
    restart: "no"

  chromadb:
    image: chromadb/chroma:latest
    restart: unless-stopped
    volumes: [chroma_data:/chroma/chroma]
    ports: ["8001:8000"]
    networks: [agentx-net]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/heartbeat || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://agentx:${POSTGRES_PASSWORD}@postgres/agentx_db
      REDIS_URL: redis://redis:6379
      OLLAMA_URL: http://ollama:11434
      CHROMA_URL: http://chromadb:8000
    ports: ["8000:8000"]
    networks: [agentx-net]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      ollama: { condition: service_healthy }
      chromadb: { condition: service_healthy }

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    command: celery -A celery_worker worker --loglevel=info --concurrency=4
    env_file: .env
    environment:
      DATABASE_URL: postgresql://agentx:${POSTGRES_PASSWORD}@postgres/agentx_db
      REDIS_URL: redis://redis:6379
      OLLAMA_URL: http://ollama:11434
    networks: [agentx-net]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      ollama: { condition: service_healthy }

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_WS_URL: ws://localhost:8000
    ports: ["3000:3000"]
    networks: [agentx-net]

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    ports: ["80:80", "443:443"]
    networks: [agentx-net]
    depends_on: [backend, frontend]